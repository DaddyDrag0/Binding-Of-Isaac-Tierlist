<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isaac Repentance Item Tier List Editor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header><h1>Binding of Isaac: Repentance Item Tier List (Editable)</h1></header>
  <section class="controls">
    <input id="search" placeholder="Search name, effect, tags..." />
    <select id="tierFilter"></select>
    <select id="qualityFilter"></select>
    <select id="typeFilter"></select>
    <select id="sortBy">
      <option value="name">Sort: Name</option><option value="id">Sort: ID</option>
      <option value="tier">Sort: Tier</option><option value="quality">Sort: Quality</option>
    </select>
    <button id="saveBtn">Save local</button><button id="resetBtn">Reset local</button>
    <button id="exportJson">Export JSON</button><button id="exportCsv">Export CSV</button>
    <label class="importLabel">Import JSON <input type="file" id="importJson" accept="application/json" /></label>
  </section>
  <main><table id="itemsTable"><thead><tr><th>ID</th><th>Name</th><th>Quality</th><th>Type</th><th>Short Effect</th><th>Tier</th><th>Why This Tier</th><th>Downsides</th><th>Major Synergies (comma sep)</th><th>Tags (comma sep)</th><th>Confidence</th></tr></thead><tbody></tbody></table></main>
  <script src="app.js"></script>
</body>
</html>
